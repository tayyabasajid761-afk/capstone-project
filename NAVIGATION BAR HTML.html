<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVIGATION BAR</title>
    <style>
        nav {
            background-color: grey;
        }
        nav a {
            color: antiquewhite;
            font-size: 17px;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            display: inline-block;
        }
        nav  a:hover {
            background-color: aqua;
            color: black;
        }
        nav .active {
            background-color: yellow;
            color: black;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="active">HOME</a>
        <a href="#">About Us</a>
        <a href="#">Gallery</a>
        <a href="#">Contact Us</a>
    </nav>
</body>
</html>
